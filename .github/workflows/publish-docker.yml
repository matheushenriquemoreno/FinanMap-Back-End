name: Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "Modulos/GerenciamentoMensal/**"

jobs:
  build-and-push-gerenciamento-mensal:
    name: Build & Push GerenciamentoMensal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: Modulos/GerenciamentoMensal
          file: Modulos/GerenciamentoMensal/WebApi/Dockerfile
          push: true
          tags: |
            matheushenrique35/app-finan-map-api:latest
            matheushenrique35/app-finan-map-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
